name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 + GCC ──
          - os: ubuntu-latest
            name: linux-x64-gcc
            cc: gcc
            cxx: g++
            cmake_args: >
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror"

          - os: ubuntu-latest
            name: linux-x64-gcc-asan
            cc: gcc
            cxx: g++
            cmake_args: >
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

          # ── Linux ARM64 + GCC ──
          - os: ubuntu-24.04-arm
            name: linux-arm64-gcc
            cc: gcc
            cxx: g++
            cmake_args: >
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror"

          # ── Windows x86_64 + MSVC ──
          - os: windows-latest
            name: win-x64-msvc
            cc: cl
            cxx: cl
            cmake_args: >
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="/W4 /WX"

          # ── macOS ARM64 + AppleClang ──
          - os: macos-latest
            name: macos-arm64-clang
            cc: clang
            cxx: clang++
            cmake_args: >
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror"

          - os: macos-latest
            name: macos-arm64-tsan
            cc: clang
            cxx: clang++
            cmake_args: >
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="-fsanitize=thread"
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

          - os: macos-latest
            name: macos-arm64-release
            cc: clang
            cxx: clang++
            cmake_args: >
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_CXX_FLAGS="-O2 -Wall -Wextra -Werror"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -B build -S .
          ${{ matrix.cmake_args }}
          -DCAMPELLO_CORE_BUILD_TESTS=ON
          -DCAMPELLO_CORE_BUILD_EXAMPLES=ON
          -DCAMPELLO_CORE_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config Debug -j1

  windows-arm64:
    name: win-arm64-msvc (cross)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (ARM64)
        run: >
          cmake -B build -S . -A ARM64
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="/W4 /WX"
          -DCAMPELLO_CORE_BUILD_TESTS=OFF
          -DCAMPELLO_CORE_BUILD_EXAMPLES=OFF
          -DCAMPELLO_CORE_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Compile smoke test
        run: cmake --build build --target android_smoke --config Debug --parallel

  android:
    name: android-ndk-arm64 (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Configure CMake (Android)
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_SYSTEM_NAME=Android
          -DCMAKE_SYSTEM_VERSION=24
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a
          -DCMAKE_ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          -DCMAKE_ANDROID_STL_TYPE=c++_shared
          -DCAMPELLO_CORE_BUILD_TESTS=OFF
          -DCAMPELLO_CORE_BUILD_EXAMPLES=OFF
          -DCAMPELLO_CORE_BUILD_BENCHMARKS=OFF

      - name: Build smoke test
        run: cmake --build build --target android_smoke --parallel
